name: Vivado FPGA

on:
  workflow_dispatch:
    inputs:
      run_bitstream:
        description: Also run the full Zybo Z7 bitstream/Vitis/BOOT.BIN flow
        type: boolean
        required: true
        default: false

permissions:
  contents: read

concurrency:
  group: vivado-fpga-${{ github.ref }}
  cancel-in-progress: false

jobs:
  xsim:
    name: vivado / xsim · RTL regression
    runs-on:
      - self-hosted
      - linux
      - vivado

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Prepare Vivado environment
        run: |
          if [[ -n "${VIVADO_SETTINGS:-}" && -f "${VIVADO_SETTINGS}" ]]; then
            source "${VIVADO_SETTINGS}"
          elif [[ -f "${HOME}/Xilinx/2025.2/Vivado/settings64.sh" ]]; then
            source "${HOME}/Xilinx/2025.2/Vivado/settings64.sh"
          elif [[ -f "/tools/Xilinx/2025.2/Vivado/settings64.sh" ]]; then
            source "/tools/Xilinx/2025.2/Vivado/settings64.sh"
          fi

          command -v xvlog
          command -v xelab
          command -v xsim
          command -v vivado

      - name: Clean generated simulation files
        run: |
          make clean

      - name: Run RTL regression
        run: |
          make regression

      - name: Upload simulation logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xsim-logs
          if-no-files-found: ignore
          path: |
            sim/**/*.log
            *.log
            *.jou
            *_xsim_run.log

  zybo_z7:
    name: vivado / zybo-z7 · bitstream · xsa · elf · boot
    needs: xsim
    if: ${{ inputs.run_bitstream }}
    runs-on:
      - self-hosted
      - linux
      - vivado

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Prepare Vivado/Vitis environment
        run: |
          if [[ -n "${VIVADO_SETTINGS:-}" && -f "${VIVADO_SETTINGS}" ]]; then
            source "${VIVADO_SETTINGS}"
          elif [[ -f "${HOME}/Xilinx/2025.2/Vivado/settings64.sh" ]]; then
            source "${HOME}/Xilinx/2025.2/Vivado/settings64.sh"
          elif [[ -f "/tools/Xilinx/2025.2/Vivado/settings64.sh" ]]; then
            source "/tools/Xilinx/2025.2/Vivado/settings64.sh"
          fi

          command -v vivado
          command -v vitis
          command -v bootgen

      - name: Run full pre-board proof flow
        run: |
          make clean
          make full-preboard-proof
          make check-warnings
          make docs-check

      - name: Upload FPGA build reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zybo-z7-build-reports
          if-no-files-found: ignore
          path: |
            build/**/*.rpt
            build/**/*.log
            build/**/*.jou
            build/**/*.bit
            build/**/*.xsa
            build/**/*.elf
            build/BOOT.BIN
            docs/logs/*.log
            docs/logs/*.md
            docs/logs/*.txt

  warnings:
    name: vivado / warnings · budget
    needs: zybo_z7
    if: ${{ inputs.run_bitstream }}
    runs-on:
      - self-hosted
      - linux
      - vivado

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download FPGA build reports
        uses: actions/download-artifact@v4
        with:
          name: zybo-z7-build-reports
          path: .

      - name: Prepare Vivado environment
        run: |
          if [[ -n "${VIVADO_SETTINGS:-}" && -f "${VIVADO_SETTINGS}" ]]; then
            source "${VIVADO_SETTINGS}"
          elif [[ -f "${HOME}/Xilinx/2025.2/Vivado/settings64.sh" ]]; then
            source "${HOME}/Xilinx/2025.2/Vivado/settings64.sh"
          elif [[ -f "/tools/Xilinx/2025.2/Vivado/settings64.sh" ]]; then
            source "/tools/Xilinx/2025.2/Vivado/settings64.sh"
          fi

          command -v vivado

      - name: Re-run warning budget on checked-out artifacts
        run: |
          make check-warnings
