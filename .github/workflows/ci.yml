name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  source-checks:
    name: Source checks
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install check tools
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck verilator

      - name: Check shell script syntax
        run: |
          find scripts -name '*.sh' -print0 | xargs -0 -r bash -n

      - name: Run shellcheck
        run: |
          find scripts -name '*.sh' -print0 | xargs -0 -r shellcheck

      - name: Check Python syntax
        run: |
          python3 -m compileall -q models scripts software

      - name: Verilator lint
        run: |
          make lint
