<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">Arty Z7 CNN DMA accelerator architecture</title>
  <desc id="desc">Block diagram showing Zynq PS, AXI-Lite control, AXI DMA, DDR buffers, AXI-Stream CNN datapath, and optional ILA probes.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#1f2937"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .shell { fill: #ffffff; stroke: #334155; stroke-width: 2; }
      .ps { fill: #dbeafe; stroke: #1d4ed8; stroke-width: 2; }
      .mem { fill: #dcfce7; stroke: #15803d; stroke-width: 2; }
      .ip { fill: #fef3c7; stroke: #b45309; stroke-width: 2; }
      .rtl { fill: #fce7f3; stroke: #be185d; stroke-width: 2; }
      .debug { fill: #ede9fe; stroke: #6d28d9; stroke-width: 2; stroke-dasharray: 8 5; }
      .line { fill: none; stroke: #1f2937; stroke-width: 3; marker-end: url(#arrow); }
      .lite { stroke: #2563eb; }
      .stream { stroke: #be185d; }
      .memline { stroke: #15803d; }
      .label { font: 600 18px Arial, sans-serif; fill: #111827; }
      .small { font: 14px Arial, sans-serif; fill: #374151; }
      .tiny { font: 12px Arial, sans-serif; fill: #475569; }
      .badge { fill: #ffffff; stroke: #64748b; stroke-width: 1.5; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1280" height="760"/>
  <rect class="shell" x="30" y="30" width="1220" height="700" rx="8"/>
  <text class="label" x="60" y="72">Arty Z7-20 / Zynq-7000 CNN DMA Accelerator</text>
  <text class="small" x="60" y="98">Board-facing architecture generated by the Vivado Tcl flow</text>

  <rect class="ps" x="70" y="140" width="250" height="150" rx="8"/>
  <text class="label" x="95" y="180">Processing System</text>
  <text class="small" x="95" y="210">ARM Cortex-A9</text>
  <text class="small" x="95" y="235">Bare-metal DMA test</text>
  <text class="small" x="95" y="260">UART PASS/timing log</text>

  <rect class="mem" x="70" y="470" width="250" height="130" rx="8"/>
  <text class="label" x="105" y="510">DDR Memory</text>
  <text class="small" x="105" y="540">input RGB buffer</text>
  <text class="small" x="105" y="565">output int32 buffer</text>

  <rect class="ip" x="420" y="125" width="260" height="120" rx="8"/>
  <text class="label" x="455" y="165">AXI-Lite Interconnect</text>
  <text class="small" x="455" y="195">PS GP0 master</text>
  <text class="small" x="455" y="220">control/status writes</text>

  <rect class="ip" x="420" y="465" width="260" height="150" rx="8"/>
  <text class="label" x="500" y="505">AXI DMA</text>
  <text class="small" x="470" y="535">MM2S: DDR to stream</text>
  <text class="small" x="470" y="560">S2MM: stream to DDR</text>
  <text class="small" x="470" y="585">simple mode, polled</text>

  <rect class="rtl" x="790" y="95" width="360" height="585" rx="8"/>
  <text class="label" x="835" y="135">cnn_dma_system_top</text>

  <rect class="badge" x="825" y="165" width="290" height="72" rx="6"/>
  <text class="small" x="850" y="195">AXI-Lite register block</text>
  <text class="tiny" x="850" y="217">width, height, mode, weights, bias</text>

  <rect class="badge" x="825" y="285" width="290" height="74" rx="6"/>
  <text class="small" x="850" y="315">axis_rgb_to_channels</text>
  <text class="tiny" x="850" y="337">0x00BBGGRR to R/G/B samples</text>

  <rect class="badge" x="825" y="385" width="290" height="104" rx="6"/>
  <text class="small" x="850" y="415">streaming_cnn_core</text>
  <text class="tiny" x="850" y="437">1x1 path and valid 3x3 windows</text>
  <text class="tiny" x="850" y="459">conv engine, ReLU, bias, quant</text>

  <rect class="badge" x="825" y="535" width="290" height="72" rx="6"/>
  <text class="small" x="850" y="565">axis_output_widen</text>
  <text class="tiny" x="850" y="587">signed int8 to 32-bit DMA word</text>

  <rect class="debug" x="910" y="650" width="230" height="48" rx="8"/>
  <text class="small" x="940" y="680">optional ILA probes</text>

  <line class="line lite" x1="320" y1="185" x2="420" y2="185"/>
  <text class="tiny" x="335" y="170">AXI-Lite</text>

  <line class="line lite" x1="680" y1="185" x2="825" y2="200"/>
  <text class="tiny" x="700" y="165">CNN config 0x43C00000</text>

  <path class="line lite" d="M550 245 C550 325 550 375 550 465"/>
  <text class="tiny" x="568" y="355">DMA ctrl 0x40400000</text>

  <line class="line memline" x1="320" y1="535" x2="420" y2="535"/>
  <text class="tiny" x="330" y="518">DDR read/write</text>

  <line class="line stream" x1="680" y1="520" x2="825" y2="322"/>
  <text class="tiny" x="700" y="470">MM2S AXI-Stream pixels</text>

  <line class="line stream" x1="825" y1="572" x2="680" y2="572"/>
  <text class="tiny" x="690" y="555">S2MM AXI-Stream results</text>

  <path class="line" d="M970 237 L970 285"/>
  <path class="line" d="M970 359 L970 385"/>
  <path class="line" d="M970 489 L970 535"/>
  <path class="line" d="M1025 607 L1025 650"/>

  <text class="tiny" x="70" y="690">Pre-board proof: simulation, timing closure, XSA, ELF, BOOT.BIN, warning budget</text>
  <text class="tiny" x="70" y="712">Board proof to capture: UART PASS log, transfer cycles/usec, setup photo, optional ILA waveform</text>
</svg>
